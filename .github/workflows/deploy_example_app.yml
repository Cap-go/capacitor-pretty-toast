name: Deploy example app to Capgo

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
    inputs:
      channel:
        description: 'Capgo channel'
        required: false
        default: 'production'
      comment:
        description: 'Optional release comment'
        required: false
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'ios/**'
      - 'android/**'
      - 'example-app/**'
      - 'scripts/deploy-example-capgo.mjs'
      - 'package.json'
      - 'bun.lock'
      - 'rollup.config.mjs'
      - 'tsconfig.json'

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          filter: blob:none
          persist-credentials: false

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install plugin dependencies
        run: bun install --frozen-lockfile

      - name: Build plugin
        run: bun run build

      - name: Install example dependencies
        working-directory: example-app
        run: bun install --frozen-lockfile

      - name: Sync example updater version
        run: |
          bun -e '
            const fs = require("fs");
            const packageVersion = require("./package.json").version;
            const configPath = "./example-app/capacitor.config.json";
            const config = JSON.parse(fs.readFileSync(configPath, "utf8"));
            config.plugins ??= {};
            config.plugins.CapacitorUpdater ??= {};
            config.plugins.CapacitorUpdater.version = packageVersion;
            fs.writeFileSync(configPath, `${JSON.stringify(config, null, 2)}\n`);
          '

      - name: Build example app
        working-directory: example-app
        run: bun run build

      - name: Resolve Capgo upload metadata
        id: upload
        shell: bash
        env:
          INPUT_CHANNEL: ${{ github.event.inputs.channel }}
          INPUT_COMMENT: ${{ github.event.inputs.comment }}
        run: |
          set -euo pipefail

          channel="${INPUT_CHANNEL:-}"
          comment="${INPUT_COMMENT:-}"
          package_version="$(bun -e "const pkg = require('./package.json'); console.log(pkg.version)")"
          config_version="$(bun -e "const cfg = require('./example-app/capacitor.config.json'); console.log(cfg.plugins?.CapacitorUpdater?.version ?? '')")"

          if [[ -z "$channel" ]]; then
            channel="production"
          fi

          if [[ -z "$package_version" ]]; then
            echo "package.json is missing a version."
            exit 1
          fi

          if [[ "$config_version" != "$package_version" ]]; then
            echo "CapacitorUpdater.version ($config_version) must match package.json version ($package_version)."
            exit 1
          fi

          bundle="$package_version"

          if [[ -z "$comment" ]]; then
            comment="Pretty Toast example $package_version"
          fi

          {
            echo "channel=$channel"
            echo "bundle=$bundle"
            echo "comment<<__CAPGO_COMMENT__"
            echo "$comment"
            echo "__CAPGO_COMMENT__"
          } >> "$GITHUB_OUTPUT"

      - name: Deploy to Capgo
        working-directory: example-app
        run: |
          bunx @capgo/cli@7 bundle upload app.capgo.pretty.toast \
            --path dist \
            --channel "$UPLOAD_CHANNEL" \
            --bundle "$UPLOAD_BUNDLE" \
            --package-json ../package.json,package.json \
            --node-modules ../node_modules,node_modules \
            --delta \
            --no-key \
            --ignore-checksum-check \
            --version-exists-ok \
            --comment "$UPLOAD_COMMENT"
        env:
          CAPGO_TOKEN: ${{ secrets.CAPGO_TOKEN }}
          UPLOAD_CHANNEL: ${{ steps.upload.outputs.channel }}
          UPLOAD_BUNDLE: ${{ steps.upload.outputs.bundle }}
          UPLOAD_COMMENT: ${{ steps.upload.outputs.comment }}
