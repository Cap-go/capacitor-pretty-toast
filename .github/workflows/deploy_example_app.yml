name: Deploy example app to Capgo

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
    inputs:
      channel:
        description: 'Capgo channel'
        required: false
        default: 'production'
      comment:
        description: 'Optional release comment'
        required: false
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'ios/**'
      - 'android/**'
      - 'example-app/**'
      - 'scripts/deploy-example-capgo.mjs'
      - 'package.json'
      - 'bun.lock'
      - 'rollup.config.mjs'
      - 'tsconfig.json'

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          filter: blob:none
          persist-credentials: false

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install plugin dependencies
        run: bun install --frozen-lockfile

      - name: Build plugin
        run: bun run build

      - name: Install example dependencies
        working-directory: example-app
        run: bun install --frozen-lockfile

      - name: Build example app
        working-directory: example-app
        run: bun run build

      - name: Resolve Capgo upload metadata
        id: upload
        shell: bash
        env:
          INPUT_CHANNEL: ${{ github.event.inputs.channel }}
          INPUT_COMMENT: ${{ github.event.inputs.comment }}
        run: |
          set -euo pipefail

          channel="${INPUT_CHANNEL:-}"
          comment="${INPUT_COMMENT:-}"

          if [[ -z "$channel" ]]; then
            channel="production"
          fi

          if [[ -z "$comment" ]]; then
            comment="Pretty Toast example ${GITHUB_RUN_NUMBER:-manual}"
          fi

          {
            echo "channel=$channel"
            echo "comment<<__CAPGO_COMMENT__"
            echo "$comment"
            echo "__CAPGO_COMMENT__"
          } >> "$GITHUB_OUTPUT"

      - name: Deploy to Capgo
        working-directory: example-app
        run: |
          bunx @capgo/cli@latest bundle upload \
            --path dist \
            --channel "$UPLOAD_CHANNEL" \
            --package-json package.json,../package.json \
            --node-modules ../node_modules,node_modules \
            --delta \
            --no-key \
            --ignore-checksum-check \
            --version-exists-ok \
            --comment "$UPLOAD_COMMENT"
        env:
          CAPGO_TOKEN: ${{ secrets.CAPGO_TOKEN }}
          UPLOAD_CHANNEL: ${{ steps.upload.outputs.channel }}
          UPLOAD_COMMENT: ${{ steps.upload.outputs.comment }}
