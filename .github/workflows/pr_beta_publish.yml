name: Publish PR beta package

on:
  issue_comment:
    types:
      - created
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to publish
        required: true
        type: number

concurrency:
  group: pr-beta-${{ github.event.issue.number || inputs.pr_number }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  resolve:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.issue.pull_request && github.event.comment.user.type != 'Bot' && github.event.comment.body == '/publish-beta') }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read
    outputs:
      actor: ${{ steps.pr.outputs.actor }}
      head_sha: ${{ steps.pr.outputs.head_sha }}
      pr_number: ${{ steps.pr.outputs.pr_number }}
    steps:
      - name: Resolve PR and access checks
        id: pr
        uses: actions/github-script@v8
        with:
          script: |
            const prNumber = context.eventName === 'workflow_dispatch'
              ? Number(core.getInput('pr_number'))
              : context.payload.issue.number;

            const { owner, repo } = context.repo;
            const { data: pr } = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: prNumber,
            });

            const actor = context.eventName === 'issue_comment'
              ? context.payload.comment.user.login
              : context.actor;

            core.setOutput('actor', actor);
            core.setOutput('pr_number', String(prNumber));

            if (pr.state !== 'open') {
              core.setFailed(`PR #${prNumber} is not open.`);
              return;
            }

            if (pr.head.repo.full_name !== `${owner}/${repo}`) {
              core.setFailed('Fork PRs cannot publish beta packages because the workflow needs repository secrets.');
              return;
            }

            if (context.eventName === 'issue_comment') {
              const { data: permission } = await github.rest.repos.getCollaboratorPermissionLevel({
                owner,
                repo,
                username: actor,
              });
              const allowed = ['admin', 'maintain', 'write'].includes(permission.permission);

              if (!allowed) {
                core.setFailed(`@${actor} does not have permission to publish beta packages.`);
                return;
              }
            }

            const prState = await github.graphql(
              `query($owner: String!, $repo: String!, $prNumber: Int!) {
                repository(owner: $owner, name: $repo) {
                  pullRequest(number: $prNumber) {
                    commits(last: 1) {
                      nodes {
                        commit {
                          statusCheckRollup {
                            state
                          }
                        }
                      }
                    }
                  }
                }
              }`,
              {
                owner,
                repo,
                prNumber,
              },
            );

            const rollupState = prState.repository.pullRequest.commits.nodes[0]?.commit.statusCheckRollup?.state ?? 'PENDING';

            if (rollupState !== 'SUCCESS') {
              core.setFailed(`PR checks are not green yet (current state: ${rollupState}).`);
              return;
            }

            core.setOutput('head_sha', pr.head.sha);

  build-pr-head:
    needs: resolve
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    outputs:
      package_name: ${{ steps.version.outputs.package_name }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Check out PR head
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve.outputs.head_sha }}
          fetch-depth: 0
          filter: blob:none

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun ci

      - name: Check plugin wiring
        run: bun run check:wiring

      - name: Set beta package version
        id: version
        env:
          PR_NUMBER: ${{ needs.resolve.outputs.pr_number }}
        run: |
          node <<'NODE' >> "$GITHUB_OUTPUT"
          const fs = require('fs');
          const path = 'package.json';
          const pkg = JSON.parse(fs.readFileSync(path, 'utf8'));
          const baseVersion = pkg.version.split('-')[0];
          const prNumber = process.env.PR_NUMBER;
          const runNumber = process.env.GITHUB_RUN_NUMBER;
          const runAttempt = process.env.GITHUB_RUN_ATTEMPT;
          const betaVersion = `${baseVersion}-beta.pr${prNumber}.${runNumber}.${runAttempt}`;

          pkg.version = betaVersion;
          fs.writeFileSync(path, `${JSON.stringify(pkg, null, 2)}\n`);

          console.log(`package_name=${pkg.name}`);
          console.log(`version=${betaVersion}`);
          NODE

      - name: Build
        run: bun run build

      - name: Pack npm package
        run: |
          mkdir -p package
          bun pm pack --destination package --quiet

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: npm-package
          path: package/*.tgz
          if-no-files-found: error
          retention-days: 1

  publish:
    needs:
      - resolve
      - build-pr-head
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download package artifact
        uses: actions/download-artifact@v4
        with:
          name: npm-package
          path: package

      - name: Setup Node.js for npm publish
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          registry-url: 'https://registry.npmjs.org'

      - name: Publish to npm beta
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish package/*.tgz --tag beta --provenance --access public --ignore-scripts

      - name: Add PR dist-tag
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          PACKAGE_NAME: ${{ needs.build-pr-head.outputs.package_name }}
          PR_NUMBER: ${{ needs.resolve.outputs.pr_number }}
          VERSION: ${{ needs.build-pr-head.outputs.version }}
        run: npm dist-tag add "$PACKAGE_NAME@$VERSION" "pr-$PR_NUMBER"

  notify:
    needs:
      - resolve
      - build-pr-head
      - publish
    if: ${{ always() && needs.resolve.outputs.pr_number != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      # Needed to upsert the beta publish status comment on pull requests.
      issues: write
    steps:
      - name: Update PR beta publish comment
        uses: actions/github-script@v8
        env:
          ACTOR: ${{ needs.resolve.outputs.actor }}
          BUILD_RESULT: ${{ needs.build-pr-head.result }}
          HEAD_SHA: ${{ needs.resolve.outputs.head_sha }}
          PACKAGE_NAME: ${{ needs.build-pr-head.outputs.package_name }}
          PUBLISH_RESULT: ${{ needs.publish.result }}
          PR_NUMBER: ${{ needs.resolve.outputs.pr_number }}
          RESOLVE_RESULT: ${{ needs.resolve.result }}
          VERSION: ${{ needs.build-pr-head.outputs.version }}
        with:
          script: |
            const marker = '<!-- pr-beta-publish -->';
            const prNumber = Number(process.env.PR_NUMBER);
            const actor = process.env.ACTOR;
            const buildResult = process.env.BUILD_RESULT;
            const publishResult = process.env.PUBLISH_RESULT;
            const resolveResult = process.env.RESOLVE_RESULT;
            const packageName = process.env.PACKAGE_NAME;
            const version = process.env.VERSION;
            const shortSha = process.env.HEAD_SHA ? process.env.HEAD_SHA.slice(0, 7) : '';
            const published = buildResult === 'success' && publishResult === 'success';
            const body = published ? [
              marker,
              '',
              '## Beta npm build',
              '',
              'Status: published',
              '',
              `Version: \`${version}\``,
              `Source: \`${shortSha}\``,
              `Requested by @${actor}`,
              '',
              'Latest beta:',
              '```sh',
              `bun add ${packageName}@beta`,
              '```',
              '',
              'This PR only:',
              '```sh',
              `bun add ${packageName}@pr-${prNumber}`,
              '```',
              '',
              `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            ].join('\n') : [
              marker,
              '',
              '## Beta npm build',
              '',
              'Status: failed',
              '',
              `Resolve: ${resolveResult}`,
              `Build: ${buildResult}`,
              `Publish: ${publishResult}`,
              '',
              'Open the run for details:',
              `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            ].join('\n');

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 100,
            });

            const existing = comments.find((comment) => comment.user.type === 'Bot' && comment.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body,
            });
